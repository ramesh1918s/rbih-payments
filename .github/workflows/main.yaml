concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME:   shivaram1918
  DOCKERHUB_GATEWAY:    shivaram1918/rbih-payment-gateway
  DOCKERHUB_PROCESSOR:  shivaram1918/rbih-payment-processor
  AWS_REGION:           ap-south-1
  EKS_CLUSTER:          rbih-payments
  K8S_NAMESPACE:        payments

jobs:

  # ─────────────────────────────────────────────────
  #  JOB 1: Setup
  # ─────────────────────────────────────────────────
  setup:
    name: 🔧 Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      image_tag:   ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve environment & image tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="production"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            ENV="staging"
          else
            ENV="dev"
          fi

          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            LATEST=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
            if [ -z "$LATEST" ]; then
              TAG="1.0.0"
            else
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              TAG="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi

          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "image_tag=${TAG}"   >> $GITHUB_OUTPUT

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment : ${ENV}"
          echo "  Namespace   : payments"
          echo "  Image Tag   : ${TAG}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Create and push git tag
        if: github.event.inputs.image_tag == '' || github.event.inputs.image_tag == null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.image_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only push tag if it doesn't already exist
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists, skipping."
          fi

  # ─────────────────────────────────────────────────
  #  JOB 2: Build & Push
  # ─────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — payment-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment-gateway
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_GATEWAY }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKERHUB_GATEWAY }}:latest
            ${{ env.DOCKERHUB_GATEWAY }}:${{ needs.setup.outputs.environment }}-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & Push — payment-processor
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment-processor
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKERHUB_PROCESSOR }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.DOCKERHUB_PROCESSOR }}:latest
            ${{ env.DOCKERHUB_PROCESSOR }}:${{ needs.setup.outputs.environment }}-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build summary
        run: |
          echo "### 🐳 Docker Images Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |"                 >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|"                 >> $GITHUB_STEP_SUMMARY
          echo "| Gateway   | \`${{ env.DOCKERHUB_GATEWAY }}:${{ needs.setup.outputs.image_tag }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| Processor | \`${{ env.DOCKERHUB_PROCESSOR }}:${{ needs.setup.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────
  #  JOB 3: Trivy Scan
  # ─────────────────────────────────────────────────
  trivy-scan:
    name: 🔍 Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: ${{ github.event.inputs.skip_scan != 'true' }}

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy scan — payment-gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_GATEWAY }}:${{ needs.setup.outputs.image_tag }}
          format:    table
          exit-code: 0
          severity:  CRITICAL,HIGH
          output:    trivy-gateway-report.txt

      - name: Trivy scan — payment-processor
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_PROCESSOR }}:${{ needs.setup.outputs.image_tag }}
          format:    table
          exit-code: 0
          severity:  CRITICAL,HIGH
          output:    trivy-processor-report.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-reports-${{ needs.setup.outputs.image_tag }}
          path: |
            trivy-gateway-report.txt
            trivy-processor-report.txt
          retention-days: 30

      - name: Trivy summary
        run: |
          echo "### 🔍 Trivy Scan Results — \`${{ needs.setup.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

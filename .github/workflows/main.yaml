  #         pip install -r requirements.txt 2>/dev/null || true
  #         pip install pytest pytest-cov 2>/dev/null || true
  #         python -m pytest --cov=. --cov-report=xml:coverage.xml -q 2>/dev/null || true

  #     - name: Install dependencies & run tests — processor
  #       working-directory: ./services/payment-processor
  #       run: |
  #         pip install -r requirements.txt 2>/dev/null || true
  #         pip install pytest pytest-cov 2>/dev/null || true
  #         python -m pytest --cov=. --cov-report=xml:coverage.xml -q 2>/dev/null || true

  #     - name: SonarQube Scan — payment-gateway
  #       uses: SonarSource/sonarqube-scan-action@v5
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

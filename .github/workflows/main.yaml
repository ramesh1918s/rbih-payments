  #   name: 🔎 SonarQube Scan
  #   runs-on: ubuntu-latest
  #   needs: [setup, build]
  #   if: ${{ github.event.inputs.skip_scan != 'true' }}

  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0

  #     - name: Set up Python (services are Python/FastAPI)
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.11"


  #         projectBaseDir: ./services/payment-gateway
  #         args: >
  #           -Dsonar.projectKey=rbih-payment-gateway
  #           -Dsonar.projectName="RBIH Payment Gateway"
  #           -Dsonar.projectVersion=${{ needs.setup.outputs.image_tag }}
  #           -Dsonar.python.coverage.reportPaths=coverage.xml
  #           -Dsonar.qualitygate.wait=true

  #     - name: SonarQube Scan — payment-processor
  #       uses: SonarSource/sonarqube-scan-action@v5
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  #       with:
  #         projectBaseDir: ./services/payment-processor
  #         args: >
  #           -Dsonar.projectKey=rbih-payment-processor
  #           -Dsonar.projectName="RBIH Payment Processor"
  #           -Dsonar.projectVersion=${{ needs.setup.outputs.image_tag }}
  #           -Dsonar.python.coverage.reportPaths=coverage.xml
  #           -Dsonar.qualitygate.wait=true

  # ─────────────────────────────────────────────────
  #  JOB 4: Trivy — Container Vulnerability Scan
  # ─────────────────────────────────────────────────
  trivy-scan:
    name: 🔍 Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: ${{ github.event.inputs.skip_scan != 'true' }}

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy scan — payment-gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_GATEWAY }}:${{ needs.setup.outputs.image_tag }}
          format:    table
          exit-code: 0
          severity:  CRITICAL,HIGH
          output:    trivy-gateway-report.txt

      - name: Trivy scan — payment-processor
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_PROCESSOR }}:${{ needs.setup.outputs.image_tag }}
          format:    table
          exit-code: 0
          severity:  CRITICAL,HIGH
          output:    trivy-processor-report.txt

      - name: Upload Trivy reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-reports-${{ needs.setup.outputs.image_tag }}
          path: |
            trivy-gateway-report.txt
            trivy-processor-report.txt
          retention-days: 30

      - name: Trivy summary
        run: |
          echo "### 🔍 Trivy Scan Results — \`${{ needs.setup.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**payment-gateway**"                                                  >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                                               >> $GITHUB_STEP_SUMMARY
          cat trivy-gateway-report.txt                                                >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                                               >> $GITHUB_STEP_SUMMARY
          echo "**payment-processor**"                                                >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                                               >> $GITHUB_STEP_SUMMARY
          cat trivy-processor-report.txt                                              >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                                               >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────
  #  JOB 5: Manual Approval Gate 🔐
  # ─────────────────────────────────────────────────
  approval:
    name: ✅ Approval Gate — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, build, sonarqube, trivy-scan]
    if: always() && needs.build.result == 'success'

    environment:
      name: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Approval granted
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ DEPLOYMENT APPROVED BY: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Environment : ${{ needs.setup.outputs.environment }}"
          echo "  Image Tag   : ${{ needs.setup.outputs.image_tag }}"
          echo "  Namespace   : ${{ needs.setup.outputs.namespace }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ─────────────────────────────────────────────────
  #  JOB 6: Deploy to EKS via kubectl
  # ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EKS — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, approval]
    if: needs.approval.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER }}

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ needs.setup.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Patch image tags in manifests
        run: |
          TAG="${{ needs.setup.outputs.image_tag }}"

          sed -i "s|image: shivaram1918/rbih-payment-gateway:.*|image: ${{ env.DOCKERHUB_GATEWAY }}:${TAG}|g" \
            k8s/base/payment-gateway.yaml

          sed -i "s|image: shivaram1918/rbih-payment-processor:.*|image: ${{ env.DOCKERHUB_PROCESSOR }}:${TAG}|g" \
            k8s/base/payment-processor.yaml

          echo "Patched images to tag: ${TAG}"
          grep "image:" k8s/base/payment-gateway.yaml k8s/base/payment-processor.yaml

      - name: Apply namespace
        run: kubectl apply -f k8s/base/namespace.yaml

      - name: Apply network policies
        run: kubectl apply -f k8s/network-policy/network-policies.yaml

      - name: Apply monitoring stack
        run: kubectl apply -f k8s/monitoring/monitoring.yaml

      - name: Apply payment services
        run: |
          NS="${{ needs.setup.outputs.namespace }}"
          kubectl apply -f k8s/base/payment-processor.yaml -n ${NS}
          kubectl apply -f k8s/base/payment-gateway.yaml   -n ${NS}
          kubectl apply -f k8s/base/reliability.yaml       -n ${NS}
          # NodePort instead of LoadBalancer — free tier safe (no NLB cost)
          kubectl apply -f k8s/base/nodeport.yaml          -n ${NS}

      - name: Wait for rollout
        run: |
          NS="${{ needs.setup.outputs.namespace }}"
          kubectl rollout status deployment/payment-processor -n ${NS} --timeout=180s
          kubectl rollout status deployment/payment-gateway   -n ${NS} --timeout=180s

      - name: Verify pods
        run: |
          NS="${{ needs.setup.outputs.namespace }}"
          echo "━━━━━ Pods ━━━━━"
          kubectl get pods -n ${NS}
          echo ""
          echo "━━━━━ Services ━━━━━"
          kubectl get svc  -n ${NS}

      - name: Print access URL
        run: |
          NS="${{ needs.setup.outputs.namespace }}"
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}')
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🌐 App URL  : http://${NODE_IP}:30080"
          echo "  ❤  Health  : http://${NODE_IP}:30080/health"
          echo "  📊 Metrics  : http://${NODE_IP}:30080/metrics"
          echo "  ⚠  Ensure port 30080 is open in EC2 Security Group!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "| 🌐 App URL | http://${NODE_IP}:30080 |" >> $GITHUB_STEP_SUMMARY

      - name: Annotate deployments (audit trail)
        run: |
          NS="${{ needs.setup.outputs.namespace }}"
          ANNOTATION="tag=${{ needs.setup.outputs.image_tag }} actor=${{ github.actor }} sha=${{ github.sha }}"
          kubectl annotate deployment/payment-gateway  -n ${NS} kubernetes.io/change-cause="${ANNOTATION}" --overwrite
          kubectl annotate deployment/payment-processor -n ${NS} kubernetes.io/change-cause="${ANNOTATION}" --overwrite

      - name: Upload applied manifests as artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-manifests-applied-${{ needs.setup.outputs.image_tag }}
          path: |
            k8s/base/payment-gateway.yaml
            k8s/base/payment-processor.yaml
            k8s/base/reliability.yaml
            k8s/base/nodeport.yaml
            k8s/network-policy/network-policies.yaml
          retention-days: 90

      - name: Deployment summary
        run: |
          NS="${{ needs.setup.outputs.namespace }}"
          echo "### 🚀 RBIH Payments Deployed to EKS"            >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                                  >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                                  >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Environment | \`${{ needs.setup.outputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Image Tag   | \`${{ needs.setup.outputs.image_tag }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Namespace   | \`${NS}\` |"                                  >> $GITHUB_STEP_SUMMARY
          echo "| ⎈  EKS Cluster | \`${{ env.EKS_CLUSTER }}\` |"                >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch      | \`${{ github.ref_name }}\` |"                 >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Deployed by | \`${{ github.actor }}\` |"                    >> $GITHUB_STEP_SUMMARY
          echo ""                                                 >> $GITHUB_STEP_SUMMARY
          echo "**Pod status:**"                                  >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                          >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${NS}                              >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                          >> $GITHUB_STEP_SUMMARY

          - dev
          - staging
          - production
        default: dev

      branch:
        description: "🌿 Branch to deploy"
        required: true
        type: choice
        options:
          - main
          - develop
          - staging
        default: main

      image_tag:
        description: "🐳 Docker image tag (leave empty = auto increment)"
        required: false
        default: ""

      skip_scan:
        description: "⚡ Skip Trivy security scan?"

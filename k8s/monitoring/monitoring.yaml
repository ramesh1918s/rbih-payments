apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    kubernetes.io/metadata.name: monitoring
---
# ─────────────────────────────────────────
# PROMETHEUS CONFIG
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: 'payment-gateway'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [payments]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: payment-gateway
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # FIX: preserve pod name and namespace as labels for alerting
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: 'payment-processor'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [payments]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: payment-processor
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  payment-alerts.yaml: |
    groups:
      - name: payment-service-alerts
        rules:

          # FIX: original used http_requests_total{status="Internal Server Error"} — that label
          # value is the full HTTP phrase, not a status code. Actual metric from the Go app is
          # gateway_requests_total{status="upstream_error|bad_request|processor_error"}.
          # Using a broad regex that covers any non-success label value.
          - alert: HighErrorRate
            expr: |
              sum(rate(gateway_requests_total{status!="success"}[5m]))
              /
              sum(rate(gateway_requests_total[5m])) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on payment-gateway"
              description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

          # FIX: metric name updated to match Go app — gateway_request_duration_seconds
          - alert: HighLatency
            expr: |
              histogram_quantile(0.99,
                rate(gateway_request_duration_seconds_bucket[5m])
              ) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P99 latency above 2s on payment-gateway"
              description: "P99 latency is {{ $value }}s"

          # FIX: metric name updated to match Go app — processor_payments_total
          - alert: ProcessorHighErrorRate
            expr: |
              sum(rate(processor_payments_total{status!="success"}[5m]))
              /
              sum(rate(processor_payments_total[5m])) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on payment-processor"
              description: "Processor error rate is {{ $value | humanizePercentage }}"

          - alert: ProcessorDown
            expr: up{job="payment-processor"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "payment-processor is unreachable"
              description: "Prometheus cannot scrape payment-processor — pod may be down"

          - alert: GatewayDown
            expr: up{job="payment-gateway"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "payment-gateway is unreachable"
              description: "Prometheus cannot scrape payment-gateway — pod may be down"

          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace="payments",condition="true"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} not ready"
---
# ─────────────────────────────────────────
# PROMETHEUS RBAC
# ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints, nodes, nodes/metrics]
    verbs: [get, list, watch]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
# ─────────────────────────────────────────
# PROMETHEUS DEPLOYMENT
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # FIX: was missing liveness/readiness probes on Prometheus itself
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: storage
          emptyDir: {} # NOTE: data lost on pod restart — use PVC in production
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP # FIX: was missing type — defaulted to ClusterIP but better to be explicit
---
# ─────────────────────────────────────────
# GRAFANA — Datasource auto-provision
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
---
# ─────────────────────────────────────────
# GRAFANA — Dashboard provider
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: payments
        orgId: 1
        folder: Payments
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
# ─────────────────────────────────────────
# GRAFANA — Payments dashboard
# FIX: metric names updated to match actual Go app metric names
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-payments
  namespace: monitoring
data:
  payments.json: |
    {
      "title": "RBIH Payments",
      "uid": "rbih-payments",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Gateway Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(gateway_requests_total[1m])) by (status)",
              "legendFormat": "{{ status }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" }
          }
        },
        {
          "id": 2,
          "title": "Gateway P99 Latency (s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(gateway_request_duration_seconds_bucket[5m])) by (le, endpoint))",
              "legendFormat": "p99 {{ endpoint }}"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(gateway_request_duration_seconds_bucket[5m])) by (le, endpoint))",
              "legendFormat": "p50 {{ endpoint }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 3,
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 * sum(rate(gateway_requests_total{status!=\"success\"}[5m])) / sum(rate(gateway_requests_total[5m]))",
              "legendFormat": "gateway error %"
            },
            {
              "expr": "100 * sum(rate(processor_payments_total{status!=\"success\"}[5m])) / sum(rate(processor_payments_total[5m]))",
              "legendFormat": "processor error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Scrape Targets Up",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(up{job=~\"payment-gateway|payment-processor\"})",
              "legendFormat": "Pods Up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 4 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          }
        },
        {
          "id": 5,
          "title": "Total Amount Processed",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "processor_amount_total",
              "legendFormat": "Total Amount"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "currencyINR", "color": { "mode": "palette-classic" } }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value"
          }
        }
      ]
    }
---
# ─────────────────────────────────────────
# GRAFANA SECRET
# WARNING: hardcoded password is fine for local/dev.
# In production use external-secrets or AWS Secrets Manager.
# ─────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
stringData:
  admin-password: "rbih@admin2026"
---
# ─────────────────────────────────────────
# GRAFANA DEPLOYMENT
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # FIX: was missing securityContext — grafana should not run as root
      securityContext:
        runAsNonRoot: true
        runAsUser: 472 # grafana's official UID
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: "/etc/grafana/provisioning"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-payments
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          # FIX: was missing probes on Grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-payments
          configMap:
            name: grafana-dashboard-payments
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort

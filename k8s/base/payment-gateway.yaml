apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: payments
  labels:
    app: payment-gateway
    app.kubernetes.io/part-of: rbih-payments
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: payment-gateway
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: payment-gateway
      automountServiceAccountToken: false # FIX: was missing — SA token unnecessary
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: payment-gateway
      containers:
        - name: payment-gateway
          image: shivaram1918/rbih-payment-gateway:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            # FIX: was PROCESSOR_URL — the app reads PAYMENT_PROCESSOR_URL per the challenge spec
            - name: PAYMENT_PROCESSOR_URL
              value: "http://payment-processor.payments.svc.cluster.local:8080"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "10"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # FIX: probe path was /healthz — challenge images expose /health
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5 # FIX: was 10 — unnecessarily slow for readiness
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe: # FIX: was missing — prevents liveness killing slow-start pods
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 10
            periodSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-gateway
  namespace: payments
  labels:
    app: payment-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: payments
  labels:
    app: payment-gateway
spec:
  selector:
    app: payment-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
